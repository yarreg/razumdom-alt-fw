# DDM845R — 4 независимых канала, каждый управляется качелей.
# DI0 — кнопка на плате (PB13).
# DI1..DI8 — входы через MCP3208 ADC.
#
# Прошивка: BOARD=ddm845r
# Применить: python modbus_configure.py write --port /dev/ttyUSB0 --slave 34 --config ddm845r_4rocker.yaml

modbus:
  address: 34
  baud: 57600
  parity: N
  stop_bits: 2

inputs:
  di_adc_active_threshold: 1000  # MCP3208: активно при значении <= порога
  debounce_ms: 30
  short_press_min_ms: 50
  short_press_max_ms: 700
  long_press_ms: 800

auto_light:
  suppress_s: 15

channels:
  1: {min_level: 0, max_level: 1023, default_level: 1023, night_level: 50, fade_on_ms: 0, fade_off_ms: 0, output_curve: 4}
  2: {min_level: 0, max_level: 1023, default_level: 1023, night_level: 50, fade_on_ms: 0, fade_off_ms: 0, output_curve: 4}
  3: {min_level: 0, max_level: 1023, default_level: 1023, night_level: 50, fade_on_ms: 0, fade_off_ms: 0, output_curve: 4}
  4: {min_level: 0, max_level: 1023, default_level: 1023, night_level: 50, fade_on_ms: 0, fade_off_ms: 0, output_curve: 4}

bindings:
  - type: rocker
    target: channel1
    up: DI1
    down: DI2
    hold_step: 8
    hold_period_ms: 20

  - type: rocker
    target: channel2
    up: DI3
    down: DI4
    hold_step: 8
    hold_period_ms: 20

  - type: rocker
    target: channel3
    up: DI5
    down: DI6
    hold_step: 8
    hold_period_ms: 20

  - type: rocker
    target: channel4
    up: DI7
    down: DI8
    hold_step: 8
    hold_period_ms: 20
